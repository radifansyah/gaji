name: iOS-ipa-build

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-latest
    steps:
      # 1. Checkout kode menggunakan versi terbaru yang mendukung Node modern
      - uses: actions/checkout@v4

      # 2. Setup Flutter SDK dengan benar
      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # Menghapus paksaan arsitektur agar mencakup semua kecocokan SDK otomatis
          cache: true # Mengaktifkan cache agar proses pub get berikutnya lebih cepat

      # 3. Ambil dependensi (Sekarang Flutter SDK sudah dipastikan tersedia)
      - name: Install Dependencies
        run: flutter pub get

      # 4. Jalankan analisis kode (opsional, untuk memastikan tidak ada error sintaks)
      - name: Analyze Project Code
        run: flutter analyze

      # 5. Build iOS tanpa Code Signing
      - name: Build Xcode Project
        run: flutter build ios --release --no-codesign

      # 6. Pembuatan struktur folder Payload untuk berkas .ipa
      - name: Create IPA Package
        run: |
          mkdir -p Payload
          mv Runner.app/ Payload/
          zip -qq -r -9 FlutterIpaExport.ipa Payload
        working-directory: build/ios/iphoneos

      # 7. Unggah hasil akhir ke GitHub Release
      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/ios/iphoneos/FlutterIpaExport.ipa
          tag: v1.0
          overwrite: true
          body: "This is first release"
