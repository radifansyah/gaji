name: iOS-ipa-build

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-latest
    steps:
      # 1. Checkout kode dari repositori
      - uses: actions/checkout@v4

      # 2. Setup Flutter (Arsitektur disesuaikan dengan Apple Silicon macos-latest)
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: arm64 # Diubah dari x64 ke arm64 karena runner macos-latest sekarang menggunakan M1/M2

      # 3. Ambil dependensi Flutter
      - run: flutter pub get

      # 4. Langkah Analisis Kode (Memastikan tidak ada error sebelum di-build)
      - name: Analyze Project Code
        run: flutter analyze

      # 5. Build iOS tanpa Code Signing (Menghasilkan Runner.app)
      - run: flutter build ios --release --no-codesign

      # 6. Membuat berkas .ipa (Payload)
      - name: Create IPA Package
        run: |
          mkdir -p Payload
          mv Runner.app/ Payload/
          zip -qq -r -9 FlutterIpaExport.ipa Payload
        working-directory: build/ios/iphoneos

      # 7. Upload file .ipa ke GitHub Release
      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/ios/iphoneos/FlutterIpaExport.ipa
          tag: v1.0
          overwrite: true
          body: "This is first release"
